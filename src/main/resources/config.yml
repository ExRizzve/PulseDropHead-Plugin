# ru or eng
language: eng

# drop mode: pvp - only player kills, pve - environment deaths only,  all - any death
drop-mode: pvp

# chance of head dropping 0.0 - 100.0
drop-chance: 100.0

# display name for dropped heads %player% will be replaced with player name
head-display-name: "Head %player%"

# glowing effect settings
glowing:
  # enable glowing effect on dropped heads
  enabled: false
  # glow color - WHITE, RED, BLUE, GREEN, YELLOW, AQUA, GOLD, DARK_RED, etc.
  color: "WHITE"
  # duration of glow effect in seconds -1 for infinite
  duration-seconds: 30

# auto-despawn settings
despawn:
  # enable automatic despawn of dropped heads
  enabled: true
  # time in seconds before head despawns
  time-seconds: 300 # 300 = 5 min.

# lightning effect on death
lightning:
  # enable visual lightning strike on player death (no damage, visual only)
  enabled: false

# death message settings
death-message:
  # enable custom death message in chat
  enabled: false
  # message format - %player% = victim name, %killer% = killer name
  # supports HEX colors: &#FF5555 or legacy codes: &c, &a, etc.
  format: "&#FF5555 %player% &#FFFFFFwas killed by &#55FF55%killer%"
